<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小肚筆記本</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0eb;
  --card-bg:#ffffff;
  --text:#2d2d2d;
  --text-secondary:#888888;
  --accent:#e86858;
  --accent-hover:#d45545;
  --accent-light:#fde8e4;
  --border:#e8e0d8;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --shadow-hover:0 4px 20px rgba(0,0,0,0.10);
  --overlay:rgba(0,0,0,0.35);
  --danger:#d44545;
  --danger-bg:#fde8e8;
  --input-bg:#f8f4f0;
  --header-bg:rgba(245,240,235,0.85);
  --bottom-bg:rgba(255,255,255,0.92);
  --radius:16px;
  --radius-sm:10px;
  --font:'Segoe UI','PingFang TC','Noto Sans TC',system-ui,-apple-system,sans-serif
}
[data-theme="dark"]{
  --bg:#1a1a2e;
  --card-bg:#252540;
  --text:#e8e8f0;
  --text-secondary:#8888a0;
  --accent:#ff7e67;
  --accent-hover:#ff6a50;
  --accent-light:#2d1a28;
  --border:#333350;
  --shadow:0 2px 12px rgba(0,0,0,0.25);
  --shadow-hover:0 4px 20px rgba(0,0,0,0.35);
  --overlay:rgba(0,0,0,0.55);
  --danger:#ff5555;
  --danger-bg:#2d1515;
  --input-bg:#2a2a44;
  --header-bg:rgba(26,26,46,0.85);
  --bottom-bg:rgba(37,37,64,0.92);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  transition:background .3s,color .3s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

/* Header */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px 8px;
  background:var(--header-bg);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:10;
  flex-shrink:0;
}
header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header-actions{display:flex;gap:8px}
.header-actions button{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:6px 12px;
  font-size:13px;
  color:var(--text);
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.header-actions button:active{transform:scale(0.95)}
.header-actions .sync-btn{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:13px;
}
.header-actions .sync-btn.synced{color:#22c55e;border-color:#86efac}
.header-actions .sync-btn.unsynced{color:var(--accent);border-color:var(--accent)}
.header-actions .sync-btn.syncing{opacity:0.6;pointer-events:none}
.header-actions .sync-btn.disconnected{color:var(--text-secondary);border-color:var(--border)}

/* Search */
.search-bar{
  padding:4px 16px 10px;
  flex-shrink:0;
}
.search-bar input{
  width:100%;
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--input-bg);
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:border .2s;
  font-family:var(--font);
}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text-secondary)}

/* Notes Grid */
#notesContainer{
  flex:1;
  overflow-y:auto;
  padding:4px 12px 90px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  align-content:start;
}
@media(min-width:600px){
  #notesContainer{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));padding:8px 16px 100px}
}
@media(min-width:900px){
  #notesContainer{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:12px 24px 100px}
}

/* Empty State */
.empty-state{
  grid-column:1/-1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
  color:var(--text-secondary);
  text-align:center;
}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px;line-height:1.6}

/* Note Card */
.note-card{
  background:var(--card-bg);
  border-radius:var(--radius);
  padding:14px 14px 12px;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  position:relative;
  min-height:90px;
  display:flex;
  flex-direction:column;
  break-inside:avoid;
  border:1.5px solid transparent;
}
.note-card:active{transform:scale(0.97)}
.note-card.pinned{
  border-color:var(--accent);
  box-shadow:var(--shadow-hover);
}
.note-card .pin-badge{
  position:absolute;
  top:6px;right:8px;
  font-size:14px;
  opacity:0;
  transition:opacity .2s;
}
.note-card.pinned .pin-badge{opacity:1}
.note-card .card-title{
  font-size:15px;
  font-weight:600;
  margin-bottom:6px;
  line-height:1.3;
  padding-right:20px;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.note-card .card-preview{
  font-size:13px;
  color:var(--text-secondary);
  line-height:1.4;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  flex:1;
}
.note-card .card-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:8px;
  gap:6px;
}
.note-card .card-tags{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  min-width:0;
  flex:1;
}
.note-card .tag{
  font-size:11px;
  padding:2px 7px;
  border-radius:20px;
  background:var(--accent-light);
  color:var(--accent);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100px;
}
.note-card .card-date{
  font-size:11px;
  color:var(--text-secondary);
  white-space:nowrap;
  flex-shrink:0;
}

/* Bottom Bar */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom,0px));
  background:var(--bottom-bg);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;
  justify-content:center;
  z-index:20;
  border-top:1px solid var(--border);
}
.bottom-bar button{
  width:52px;height:52px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:28px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s,background .2s;
  box-shadow:0 2px 12px rgba(232,104,88,0.35);
}
[data-theme="dark"] .bottom-bar button{box-shadow:0 2px 12px rgba(255,126,103,0.3)}
.bottom-bar button:active{transform:scale(0.9)}
.bottom-bar button:hover{background:var(--accent-hover)}

/* Editor Overlay */
.overlay{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:var(--overlay);
  z-index:100;
  align-items:flex-end;
  justify-content:center;
}
.overlay.open{display:flex}
.editor-panel{
  background:var(--card-bg);
  border-radius:var(--radius) var(--radius) 0 0;
  width:100%;
  max-width:100%;
  max-height:92vh;
  display:flex;
  flex-direction:column;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  animation:slideUp .3s ease;
  overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:600px){
  .overlay{align-items:center}
  .editor-panel{
    border-radius:var(--radius);
    width:520px;
    max-height:80vh;
    animation:fadeIn .2s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
}

.editor-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
}
.editor-header h2{font-size:18px;font-weight:600}
.editor-header button{
  width:32px;height:32px;
  border:none;border-radius:50%;
  background:var(--input-bg);
  color:var(--text);
  font-size:16px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.editor-header button:active{transform:scale(0.9)}
.editor-panel input,.editor-panel textarea{
  width:100%;
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--input-bg);
  color:var(--text);
  font-size:14px;
  outline:none;
  font-family:var(--font);
  transition:border .2s;
  margin-bottom:12px;
}
.editor-panel input:focus,.editor-panel textarea:focus{border-color:var(--accent)}
.editor-panel textarea{min-height:140px;resize:vertical;line-height:1.5}
.editor-actions{
  display:flex;
  gap:10px;
  margin-top:4px;
}
.editor-actions button{
  flex:1;
  padding:11px;
  border:none;
  border-radius:var(--radius-sm);
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:transform .15s,opacity .15s;
  font-family:var(--font);
}
.editor-actions button:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--danger-bg);color:var(--danger)}
.btn-danger:disabled{opacity:0.3;cursor:not-allowed}

/* Context Menu */
.context-menu{
  display:none;
  position:fixed;
  z-index:200;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  padding:6px;
  min-width:140px;
}
.context-menu.show{display:block}
.context-menu button{
  display:block;
  width:100%;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  cursor:pointer;
  text-align:left;
  font-family:var(--font);
}
.context-menu button:active,.context-menu button:hover{background:var(--input-bg)}

/* Scrollbar */
#notesContainer::-webkit-scrollbar{width:4px}
#notesContainer::-webkit-scrollbar-track{background:transparent}
#notesContainer::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Toast */
.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--text);
  color:var(--bg);
  padding:8px 18px;
  border-radius:20px;
  font-size:13px;
  opacity:0;
  transition:transform .3s,opacity .3s;
  z-index:300;
  pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:0.9;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <h1>🗒️ 小肚筆記</h1>
  <div class="header-actions">
    <button id="syncBtn" class="sync-btn disconnected" title="雲端同步">☁️ <span id="syncLabel">未連線</span></button>
    <button id="sortBtn" title="切換排序">🕐 最新</button>
    <button id="themeBtn" title="切換日夜">🌙</button>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 搜尋標題、內文、標籤..." spellcheck="false">
</div>

<main id="notesContainer"></main>

<div class="bottom-bar">
  <button id="addBtn" title="新增筆記">＋</button>
</div>

<!-- Editor -->
<div class="overlay" id="editorOverlay">
  <div class="editor-panel" id="editorPanel">
    <div class="editor-header">
      <h2 id="editorTitle">新筆記</h2>
      <button id="closeEditorBtn">✕</button>
    </div>
    <input type="text" id="noteTitle" placeholder="標題" maxlength="100" spellcheck="false">
    <textarea id="noteContent" placeholder="寫點什麼..." spellcheck="true"></textarea>
    <input type="text" id="noteTags" placeholder="🏷️ 標籤（逗號分隔）" spellcheck="false">
    <div class="editor-actions">
      <button class="btn-danger" id="deleteBtn">🗑️ 刪除</button>
      <button class="btn-primary" id="saveBtn">💾 儲存</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <button id="pinContextBtn">📌 釘選筆記</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ─── Supabase Cloud Sync Config ───
const SUPABASE_URL = 'https://cufbvvdfjjnbjxqssoeh.supabase.co';
const STORAGE_BUCKET = 'notes';
const SYNC_FILE = 'notes-backup.json';

// ─── State ───
let notes = [];
let editingId = null;
let currentSort = 0; // 0=newest 1=oldest 2=alpha
let _supabase = null;
let _cloudConnected = false;
let _syncTimer = null;
const SORT_LABELS = ['🕐 最新','🕐 最舊','🕐 A-Z'];
const PIN_CONTEXT_LABELS = ['📌 釘選筆記','📌 取消釘選'];

// ─── DOM refs ───
const container = document.getElementById('notesContainer');
const searchInput = document.getElementById('searchInput');
const sortBtn = document.getElementById('sortBtn');
const themeBtn = document.getElementById('themeBtn');
const addBtn = document.getElementById('addBtn');
const syncBtn = document.getElementById('syncBtn');
const syncLabel = document.getElementById('syncLabel');

const overlay = document.getElementById('editorOverlay');
const editorTitle = document.getElementById('editorTitle');
const noteTitle = document.getElementById('noteTitle');
const noteContent = document.getElementById('noteContent');
const noteTags = document.getElementById('noteTags');
const saveBtn = document.getElementById('saveBtn');
const deleteBtn = document.getElementById('deleteBtn');
const closeEditorBtn = document.getElementById('closeEditorBtn');

const contextMenu = document.getElementById('contextMenu');
const pinContextBtn = document.getElementById('pinContextBtn');
const toast = document.getElementById('toast');

// ─── Theme ───
function getPreferredTheme(){
  return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
}
function setTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  themeBtn.textContent = theme==='dark'?'☀️':'🌙';
  localStorage.setItem('notes-theme',theme);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  setTheme(cur==='dark'?'light':'dark');
}
// Init theme
const savedTheme = localStorage.getItem('notes-theme');
if(savedTheme){setTheme(savedTheme)}
else{setTheme(getPreferredTheme())}
// Listen for system changes
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',(e)=>{
  if(!localStorage.getItem('notes-theme')){
    setTheme(e.matches?'dark':'light');
  }
});
themeBtn.addEventListener('click',toggleTheme);

// ─── Toast ───
let toastTimer=null;
function showToast(msg){
  toast.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),1800);
}

// ─── Local Storage ───
function loadNotes(){
  try{
    const raw = localStorage.getItem('notes-data');
    return raw?JSON.parse(raw):[];
  }catch{return []}
}
function saveNotes(){
  localStorage.setItem('notes-data',JSON.stringify(notes));
}

// ─── Cloud Sync ───
function getSupabaseKey(){
  return localStorage.getItem('__supabase_key');
}
function setSupabaseKey(key){
  localStorage.setItem('__supabase_key', key);
}
function getDeviceId(){
  let id = localStorage.getItem('__device_id');
  if(!id){
    id = 'device_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    localStorage.setItem('__device_id', id);
  }
  return id;
}
function getSyncFilePath(){
  return getDeviceId() + '/' + SYNC_FILE;
}

function updateSyncUI(status){
  syncBtn.className = 'sync-btn';
  if(status === 'synced'){
    syncBtn.classList.add('synced');
    syncLabel.textContent = '已同步';
    syncBtn.title = '雲端同步成功';
  } else if(status === 'unsynced'){
    syncBtn.classList.add('unsynced');
    syncLabel.textContent = '未同步';
    syncBtn.title = '點擊同步到雲端';
  } else if(status === 'syncing'){
    syncBtn.classList.add('syncing');
    syncLabel.textContent = '同步中…';
  } else { // disconnected
    syncBtn.classList.add('disconnected');
    syncLabel.textContent = '未連線';
    syncBtn.title = '點擊設定雲端同步';
  }
}

async function initSupabase(){
  const key = getSupabaseKey();
  if(!key) return false;
  try{
    _supabase = window.supabase.createClient(SUPABASE_URL, key);
    // Verify connection by listing files
    const { data, error } = await _supabase.storage.from(STORAGE_BUCKET).list(getDeviceId(), { limit: 1 });
    if(error) throw error;
    _cloudConnected = true;
    updateSyncUI('unsynced');
    return true;
  }catch(e){
    _supabase = null;
    _cloudConnected = false;
    localStorage.removeItem('__supabase_key');
    updateSyncUI('disconnected');
    return false;
  }
}

async function syncToCloud(){
  if(!_cloudConnected || !_supabase) return false;
  updateSyncUI('syncing');
  try{
    const data = JSON.stringify(notes, null, 2);
    const path = getSyncFilePath();
    const { error } = await _supabase.storage.from(STORAGE_BUCKET).upload(path, data, {
      upsert: true,
      contentType: 'application/json'
    });
    if(error) throw error;
    updateSyncUI('synced');
    return true;
  }catch(e){
    console.warn('Cloud sync failed:', e);
    updateSyncUI('unsynced');
    return false;
  }
}

async function syncFromCloud(){
  if(!_cloudConnected || !_supabase) return false;
  updateSyncUI('syncing');
  try{
    const path = getSyncFilePath();
    const { data, error } = await _supabase.storage.from(STORAGE_BUCKET).download(path);
    if(error){
      // File not found yet - first sync, that's fine
      if(error.statusCode === '404' || error.status === 404 || (error.message && error.message.includes('404'))){
        updateSyncUI('unsynced');
        return 'empty';
      }
      throw error;
    }
    const text = await data.text();
    const cloudNotes = JSON.parse(text);
    if(Array.isArray(cloudNotes) && cloudNotes.length > 0){
      const localCount = notes.length;
      const cloudCount = cloudNotes.length;
      // Merge: prefer newer updatedAt, or combine if different
      const merged = mergeNotes(notes, cloudNotes);
      notes = merged;
      saveNotes();
      // Also push merged data back up
      await syncToCloud();
      updateSyncUI('synced');
      return `merged:${localCount}->${merged.length}`;
    }
    updateSyncUI('unsynced');
    return 'empty';
  }catch(e){
    console.warn('Cloud download failed:', e);
    updateSyncUI('unsynced');
    return false;
  }
}

function mergeNotes(local, cloud){
  const map = new Map();
  local.forEach(n => map.set(n.id, n));
  cloud.forEach(n => {
    const existing = map.get(n.id);
    if(!existing){
      map.set(n.id, n);
    } else if((n.updatedAt||n.createdAt) > (existing.updatedAt||existing.createdAt)){
      map.set(n.id, n);
    }
  });
  return Array.from(map.values()).sort((a,b) => (b.updatedAt||b.createdAt) - (a.updatedAt||a.createdAt));
}

async function setupCloud(){
  const existingKey = getSupabaseKey();
  if(existingKey){
    const ok = await initSupabase();
    if(ok){
      showToast('☁️ 雲端連線成功');
      const result = await syncFromCloud();
      if(result && result.startsWith('merged:')){
        const count = result.split(':')[1];
        showToast(`☁️ 已合併雲端資料（${count} 篇筆記）`);
        render();
      } else if(result === 'empty'){
        // No cloud data yet, push local
        await syncToCloud();
      }
      return true;
    } else {
      showToast('⚠️ 金鑰無效，請重新設定');
    }
  }
  // Ask user for key
  const key = prompt(
    '🔑 請貼上 Supabase 金鑰來啟用雲端同步\n\n' +
    '金鑰只存在你瀏覽器裡，每次開筆記本都會自動同步到雲端，資料永久保存！\n\n' +
    '（貼一次就好，下次不會再問）'
  );
  if(key && key.trim()){
    setSupabaseKey(key.trim());
    const ok = await initSupabase();
    if(ok){
      showToast('✅ 雲端同步已啟用！');
      await syncFromCloud();
      await syncToCloud();
      return true;
    } else {
      localStorage.removeItem('__supabase_key');
      showToast('❌ 金鑰無效，請重試');
      return false;
    }
  }
  return false;
}

// ─── Utils ───
function generateId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function formatDate(ts){
  const d=new Date(ts);
  const pad=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function escapeHtml(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

// ─── Sort & Filter ───
function getSortedNotes(){
  let list = [...notes];
  // pinned first
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  // then sort mode
  const query = searchInput.value.trim().toLowerCase();
  const filtered = query ? list.filter(n=>{
    const title = n.title.toLowerCase();
    const content = n.content.toLowerCase();
    const tags = n.tags.toLowerCase();
    return title.includes(query)||content.includes(query)||tags.includes(query);
  }) : list;

  if(currentSort===0){
    // newest first (within pinned group)
    const pinned = filtered.filter(n=>n.pinned).sort((a,b)=>b.createdAt-a.createdAt);
    const unpinned = filtered.filter(n=>!n.pinned).sort((a,b)=>b.createdAt-a.createdAt);
    return [...pinned,...unpinned];
  } else if(currentSort===1){
    // oldest first
    const pinned = filtered.filter(n=>n.pinned).sort((a,b)=>a.createdAt-b.createdAt);
    const unpinned = filtered.filter(n=>!n.pinned).sort((a,b)=>a.createdAt-b.createdAt);
    return [...pinned,...unpinned];
  } else {
    // alphabetical
    const pinned = filtered.filter(n=>n.pinned).sort((a,b)=>a.title.localeCompare(b.title));
    const unpinned = filtered.filter(n=>!n.pinned).sort((a,b)=>a.title.localeCompare(b.title));
    return [...pinned,...unpinned];
  }
}

function cycleSort(){
  currentSort = (currentSort+1)%3;
  sortBtn.textContent = SORT_LABELS[currentSort];
  render();
}

// ─── Render ───
function render(){
  const sorted = getSortedNotes();
  if(sorted.length===0){
    container.innerHTML=`
      <div class="empty-state">
        <div class="emoji">📝</div>
        <p>還沒有筆記喔～<br>按底下的 ＋ 開始寫吧！</p>
      </div>`;
    return;
  }
  container.innerHTML = sorted.map(n=>{
    const tags = n.tags ? n.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const preview = n.content.replace(/\n/g,' ').substring(0,120);
    return `
      <div class="note-card${n.pinned?' pinned':''}" data-id="${n.id}">
        <span class="pin-badge">📌</span>
        ${n.title ? `<div class="card-title">${escapeHtml(n.title)}</div>` : ''}
        <div class="card-preview">${escapeHtml(preview)||'<span style="opacity:0.4">（空白筆記）</span>'}</div>
        <div class="card-footer">
          <div class="card-tags">${tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
          <span class="card-date">${formatDate(n.updatedAt||n.createdAt)}</span>
        </div>
      </div>`;
  }).join('');

  // Attach card events
  container.querySelectorAll('.note-card').forEach(card=>{
    // Click to edit (on desktop, and fallback for mobile tap)
    card.addEventListener('click',(e)=>{
      if(card.dataset.preventClick){card.dataset.preventClick='';return}
      openEdit(card.dataset.id);
    });
    // Right-click to pin (desktop)
    card.addEventListener('contextmenu',(e)=>{
      e.preventDefault();
      togglePin(card.dataset.id);
    });
    // Long-press to pin (mobile)
    let pressTimer=null;
    card.addEventListener('touchstart',(e)=>{
      pressTimer=setTimeout(()=>{
        pressTimer=null;
        card.dataset.preventClick='true';
        togglePin(card.dataset.id);
        // Haptic
        if(navigator.vibrate)navigator.vibrate(20);
      },500);
    },{passive:true});
    card.addEventListener('touchmove',()=>{
      if(pressTimer){clearTimeout(pressTimer);pressTimer=null}
    },{passive:true});
    card.addEventListener('touchend',()=>{
      if(pressTimer){clearTimeout(pressTimer);pressTimer=null}
    },{passive:true});
  });
}

// ─── CRUD ───
function openEdit(id){
  editingId = id;
  const note = notes.find(n=>n.id===id);
  if(note){
    editorTitle.textContent = '✏️ 編輯筆記';
    noteTitle.value = note.title;
    noteContent.value = note.content;
    noteTags.value = note.tags;
    deleteBtn.disabled = false;
  } else {
    // shouldn't happen
    closeEditor();
    return;
  }
  overlay.classList.add('open');
  setTimeout(()=>noteTitle.focus(),300);
}

function openNew(){
  editingId = null;
  editorTitle.textContent = '📝 新筆記';
  noteTitle.value = '';
  noteContent.value = '';
  noteTags.value = '';
  deleteBtn.disabled = true;
  overlay.classList.add('open');
  setTimeout(()=>noteTitle.focus(),300);
}

function closeEditor(){
  overlay.classList.remove('open');
  editingId = null;
}

async function saveCurrentNote(){
  const title = noteTitle.value.trim();
  const content = noteContent.value.trim();
  const tags = noteTags.value.trim();

  if(!title && !content){
    showToast('標題或內容至少要填一個喔～');
    return;
  }

  if(editingId){
    const idx = notes.findIndex(n=>n.id===editingId);
    if(idx!==-1){
      notes[idx].title = title;
      notes[idx].content = content;
      notes[idx].tags = tags;
      notes[idx].updatedAt = Date.now();
    }
  } else {
    notes.push({
      id: generateId(),
      title,
      content,
      tags,
      pinned: false,
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
  }
  saveNotes();
  render();
  closeEditor();
  showToast(editingId?'✅ 已更新筆記':'✅ 已新增筆記');
  // Auto sync
  await syncToCloud();
}

async function deleteCurrentNote(){
  if(!editingId) return;
  if(!confirm('確定要刪除這篇筆記嗎？')) return;
  notes = notes.filter(n=>n.id!==editingId);
  saveNotes();
  render();
  closeEditor();
  showToast('🗑️ 已刪除筆記');
  // Auto sync
  await syncToCloud();
}

async function togglePin(id){
  const note = notes.find(n=>n.id===id);
  if(!note) return;
  note.pinned = !note.pinned;
  note.updatedAt = Date.now();
  saveNotes();
  render();
  showToast(note.pinned?'📌 已釘選':'📌 已取消釘選');
  // Auto sync
  await syncToCloud();
}

// ─── Keyboard Shortcuts ───
document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape' && overlay.classList.contains('open')){
    closeEditor();
    return;
  }
  if((e.ctrlKey || e.metaKey) && e.key==='s'){
    e.preventDefault();
    if(overlay.classList.contains('open')){
      saveCurrentNote();
    }
  }
});

// ─── Event Bindings ───
addBtn.addEventListener('click',openNew);
closeEditorBtn.addEventListener('click',closeEditor);
overlay.addEventListener('click',(e)=>{if(e.target===overlay)closeEditor()});
saveBtn.addEventListener('click',saveCurrentNote);
deleteBtn.addEventListener('click',deleteCurrentNote);
sortBtn.addEventListener('click',cycleSort);
syncBtn.addEventListener('click',async ()=>{
  if(_cloudConnected){
    updateSyncUI('syncing');
    const ok = await syncToCloud();
    if(ok) showToast('☁️ 已同步到雲端');
    else showToast('⚠️ 同步失敗，請檢查網路');
  } else {
    await setupCloud();
  }
});

// Search with debounce
let searchTimer=null;
searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(render,200);
});

// ─── Init ───
notes = loadNotes();
render();

// Try to setup cloud sync
(async ()=>{
  const key = getSupabaseKey();
  if(key){
    const ok = await initSupabase();
    if(ok){
      await syncFromCloud();
      // Re-render after potential merge
      render();
      // Always push latest after init
      await syncToCloud();
    }
  } else {
    updateSyncUI('disconnected');
  }
})();

// Handle safe-area on older browsers
document.documentElement.style.setProperty('--safe-bottom','env(safe-area-inset-bottom,0px)');

console.log('🗒️ 小肚筆記本已啟動！');
})();
</script>
